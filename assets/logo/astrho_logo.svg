<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo redondeado con gradiente -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F472D0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9B7BFF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo redondeado -->
  <rect width="192" height="192" rx="45" fill="url(#grad)"/>
  
  <!-- Estrella de 4 puntas (blanca) -->
  <g transform="translate(96, 96)">
    <!-- Punto superior -->
    <path d="M 0 -50 L 12 -15 L 0 0 L -12 -15 Z" fill="white"/>
    
    <!-- Punto derecho -->
    <path d="M 50 0 L 15 12 L 0 0 L 15 -12 Z" fill="white"/>
    
    <!-- Punto inferior -->
    <path d="M 0 50 L -12 15 L 0 0 L 12 15 Z" fill="white"/>
    
    <!-- Punto izquierdo -->
    <path d="M -50 0 L -15 -12 L 0 0 L -15 12 Z" fill="white"/>
    
    <!-- Pequeños puntos decorativos -->
    <circle cx="30" cy="-30" r="6" fill="white"/>
    <circle cx="-30" cy="30" r="6" fill="white"/>
  </g>
</svg>
